server {
    listen 80;
    server_name _;

    # Serve the React Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # REGEX MAGIC: Forward all known Django routes to the backend
    # This matches /api/, /login/, /register/, /checkout/, etc.
    location ~ ^/(api|login|register|logout|checkout|webhook|search-product|suggesteds|admin|swagger|redoc) {
        proxy_pass http://ecommerce_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}